{{- if .Values.resources.deployment -}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "helm-tutorial.fullname" . }}-deploy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "helm-tutorial.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.deployment.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "helm-tutorial.fullname" . }}
      {{- if .Values.deployment.labels }}
      {{- toYaml .Values.deployment.labels | nindent 6 }}
      {{- end }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "helm-tutorial.fullname" . }}
        {{- if .Values.deployment.labels }}
        {{- toYaml .Values.deployment.labels | nindent 8 }}
        {{- end }}
    spec:
      containers:
      - name: {{ .Release.Name }}
        image: "{{ .Values.deployment.image | default "nginx:latest" }}"
        imagePullPolicy: IfNotPresent
        {{- if .Values.deployment.resources }}
        resources:
        {{- toYaml .Values.deployment.resources | nindent 10 }}
        {{- end }}
        {{- if .Values.deployment.env }}
        env:
        {{- range $key, $val := .Values.deployment.env }}
          - name: {{ $key }}
            value: "{{ $val }}"
        {{- end }}
        {{- end }}
        {{- if .Values.deployment.volumeMounts }}
        volumeMounts:
        {{- toYaml .Values.deployment.volumeMounts | nindent 10 }}
        {{- end }}
        ports:
        - containerPort: {{ .Values.deployment.internalPort | default 80 | int }}
{{- end }}