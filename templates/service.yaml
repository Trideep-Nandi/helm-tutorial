{{- if .Values.deployment.create -}}
apiVersion: v1
kind: Service
metadata: {{ $fullname := printf "%s-%s" .Release.Name .Chart.Name | trunc 57 | trimSuffix "-" }}
  name: {{ $fullname}}-svc
  labels:
    {{- include "helm-tutorial.labels" . | nindent 4}}
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.targetPort }}
    protocol: TCP
  selector:
    {{- include "helm-tutorial.selectorLabels" . | nindent 6 }}
{{- end -}}